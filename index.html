<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battleship</title>
  <link rel="stylesheet" href="battleship.css">
</head>
<body>

  <header class="game-header">
    <h1>&#9875; Battleship</h1>
    <div id="status-banner" class="status-banner placement-phase">Place your ships to begin</div>
  </header>

  <!-- Notification toast -->
  <div id="notification" class="notification hidden" role="alert" aria-live="assertive"></div>

  <!-- Controls -->
  <div class="controls">
    <button id="btn-rotate" class="btn btn-secondary" onclick="rotateShip()">&#128260; Horizontal (R)</button>
    <button id="btn-start"  class="btn btn-primary"   onclick="startGame()">&#9876;&#65039; Start Game</button>
    <button id="btn-restart" class="btn btn-secondary" onclick="restartGame()">&#128257; Restart</button>
  </div>

  <!-- Main game area -->
  <main class="game-area">

    <section class="board-section">
      <h2 class="board-title">Your Fleet</h2>
      <div id="player-grid-container" class="grid-container"></div>
      <div id="player-legend" class="ship-legend"></div>
    </section>

    <section class="log-section">
      <h3 class="log-title">Battle Log</h3>
      <div id="shot-log" class="shot-log" role="log" aria-live="polite"></div>
    </section>

    <section class="board-section">
      <h2 class="board-title">Enemy Waters</h2>
      <div id="computer-grid-container" class="grid-container"></div>
      <div id="computer-legend" class="ship-legend"></div>
    </section>

  </main>

  <!-- Ship placement panel -->
  <div id="placement-panel" class="placement-panel">
    <h3>Click a ship to select &mdash; then click your grid to place it</h3>
    <div id="ship-dock" class="ship-dock"></div>
    <p class="placement-hint">Press <kbd>R</kbd> to rotate &nbsp;|&nbsp; Click ship, then click grid</p>
  </div>

  <!-- Game-over overlay -->
  <div id="game-over-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="game-over-title">
    <div class="overlay-content">
      <div id="game-over-icon"  class="overlay-icon"></div>
      <h2   id="game-over-title"></h2>
      <p    id="game-over-msg"></p>
      <button class="btn btn-primary" onclick="restartGame()">&#9875; Play Again</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
